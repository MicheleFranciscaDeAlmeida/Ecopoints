<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EcoPoints</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #16a34a; }
        button {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { 
            background-color: #15803d; 
            cursor: pointer;
            transform: scale(1.05);
        }
        #placar { color: #16a34a; font-size: 1.2em; }
    </style>
</head>

<body>

    <div class="card">
        <h1>EcoPoints ♻️</h1>
        <p>Transforme seu lixo em benefícios reais.</p>
        <p>Seus Pontos: <strong id="placar">0</strong> pts</p>
        <button id="btnReciclar">Começar a Reciclar</button>
    </div>

    <script>
    let pontos = 0; 
    const placarElemento = document.getElementById('placar');
    const botao = document.getElementById('btnReciclar');
    const corpoSite = document.body; // Referência para o fundo do site

    botao.addEventListener('click', () => {
        pontos = pontos + 10; 
        placarElemento.innerText = pontos; 

        // Lógica de mudança de cor
        if (pontos >= 50) {
            corpoSite.style.backgroundColor = "#dcfce7"; // Um verde bem clarinho
            alert('Nível PRO atingido! 🌿 O planeta está sorrindo!');
        } else {
            alert('Boa, Michele! Você ganhou 10 pontos. O planeta agradece! 🌍🎉');
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EcoPoints - Sustentabilidade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0fdf4; /* Verde bem clarinho */
            color: #166534; /* Verde escuro */
            text-align: center;
            padding: 50px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #22c55e; }
        button {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #16a34a; }
    </style>
</head>
<body>

    <div class="card">
        <h1>EcoPoints ♻️</h1>
        <p>Transforme seu lixo em benefícios reais.</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        
        <h3 style="color: #16a34a;">Tabela de Pontos:</h3>
        <ul style="text-align: left; list-style: none; padding: 0;">
            <li>🥫 <strong>Alumínio:</strong> 250 pts/kg</li>
            <li>🍾 <strong>Vidro:</strong> 80 pts/kg</li>
            <li>📦 <strong>Papelão:</strong> 50 pts/kg</li>
        </ul>

        <p><strong>Status:</strong> Projeto iniciado no Hackathon 2026!</p>
        <button onclick="alert('Boa, Michele! O planeta agradece!')">Começar a Reciclar</button>
    </div>

</body>
</html>
